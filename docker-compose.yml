version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dicoevent_production
      - POSTGRES_USER=dicoevent_user
      - POSTGRES_PASSWORD=your_secure_password_here
    ports:
      - "5432:5432"
    networks:
      - dicoevent_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dicoevent_network

  web:
    build: .
    command: gunicorn dicoevent_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://dicoevent_user:your_secure_password_here@db:5432/dicoevent_production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    networks:
      - dicoevent_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    networks:
      - dicoevent_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  dicoevent_network:
    driver: bridge